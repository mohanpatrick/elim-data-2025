on:
  schedule:
     - cron: "17,47 * * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
name: update_leagues_mfl
jobs:
  adp_update_data:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.REPO_PAT }}
      MFL_CLIENT: ${{ secrets.MFL_CLIENT }}
      MFL_USER_ID: ${{ secrets.MFL_USER_ID }}
      MFL_PWD: ${{ secrets.MFL_PWD }}
      MFL_COMMISH_USER_ID: ${{ secrets.MFL_COMMISH_USER_ID }}
      COMMISH_CLIENT: ${{ secrets.COMMISH_CLIENT }}
      COMMISH_PWD: ${{ secrets.COMMISH_PWD }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: ffscrapr, dplyr, data.table, tidyr, purrr, stringr, piggyback, cli, readr, lubridate, tibble
          cache: true
      - name: Run data update
        run: |
          source("get_FC_league_info.R")
        shell: Rscript {0}
